# ============================================================
# A股量化回测系统 - 配置文件
# ============================================================
# 本文件定义回测系统所有可调参数。
# 修改后无需改代码，直接生效。
#
# 在代码中引用方式：
#   import yaml
#   config = yaml.safe_load(open("config.yaml"))
# ============================================================

# ── 数据配置 ──────────────────────────────────────────────
data:
  daily_dir: "data/daily"                 # 日 K 线 CSV 目录
  output_dir: "data/backtest_results"     # 回测结果输出目录

# ── 回测时间区间 ──────────────────────────────────────────
backtest:
  start_date: "2021-01-01"
  end_date: "2026-05-27"                  # 可用 "today" 表示当天

# ── 交易成本 ──────────────────────────────────────────────
costs:
  initial_capital: 1000000                # 初始资金（元）
  commission_rate: 0.0003                 # 佣金（万3）
  stamp_tax_rate: 0.001                   # 印花税（千1，卖出）
  slippage_rate: 0.001                    # 滑点（千1）

# ── 因子权重 ──────────────────────────────────────────────
# 权重可为正（正向收益预期）或负（反向）。
# 零值 = 不使用该因子。
factor_weights:
  # 动量
  mom_5: 0.05
  mom_10: 0.10
  mom_20: 0.10
  mom_60: 0.08
  mom_120: 0.05
  # 反转
  rev_3: 0.05
  rev_5: 0.08
  rev_10: 0.05
  # 波动率（负权 = 低波优先）
  vol_10: -0.03
  vol_20: -0.05
  vol_60: -0.05
  vol_change: 0.03
  # 量价
  vol_ratio_5: 0.05
  vol_ratio_20: 0.05
  amount_ratio: 0.05
  # RSI
  rsi_6: 0.03
  rsi_14: 0.05
  rsi_28: 0.02
  # MACD
  macd_12_26: 0.08
  macd_5_35: 0.04
  # 布林带
  boll_pos_10: 0.03
  boll_pos_20: 0.03
  boll_width_20: -0.02
  # 其他
  atr_14: -0.03
  skew_20: 0.02
  kurt_20: -0.02
  vwap_mom: 0.03
  rel_strength_20: 0.05
  rel_strength_60: 0.03

# ── 策略预设 ──────────────────────────────────────────────
strategies:
  v4:
    label: "v4"
    description: "v4 最优：29因子加权, top12, 20日调仓, 20%止损, vol_target=0.20, 行业上限25%"
    weight_method: "weighted"
    top_n: 12
    rebalance_freq: 20
    stop_loss: 0.20
    max_position: 0.10
    use_vol_scaling: true
    vol_target: 0.20
    max_industry_weight: 0.25
    max_daily_turnover: 0
    # Sell-side controls (default off, opt-in)
    use_take_profit: false
    tp_tiers: [[0.10, 0.30], [0.20, 0.30], [0.30, 1.00]]
    use_holding_decay: false
    use_atr_stop: false
    atr_k: 6.0

  v5:
    label: "v5"
    description: "v5: v4 + 分级止盈 + 持有期decay（推荐）"
    weight_method: "weighted"
    top_n: 12
    rebalance_freq: 20
    stop_loss: 0.20
    max_position: 0.10
    use_vol_scaling: true
    vol_target: 0.20
    max_industry_weight: 0.25
    max_daily_turnover: 0
    use_take_profit: true
    tp_tiers: [[0.10, 0.30], [0.20, 0.30], [0.30, 1.00]]
    use_holding_decay: true
    use_atr_stop: false
    atr_k: 6.0

  v3_baseline:
    label: "v3_baseline"
    description: "v3 基线：加权29因子, top12, 20日调仓, 20%止损"
    weight_method: "weighted"
    top_n: 12
    rebalance_freq: 20
    stop_loss: 0.20
    max_position: 0.10
    use_vol_scaling: true
    vol_target: 0.20
    max_industry_weight: 0.25
    max_daily_turnover: 0

  ic_ir_weighted:
    label: "ic_ir_all"
    description: "IC-IR 加权：用信息比率给因子赋权"
    weight_method: "ic_ir"
    top_n: 10
    rebalance_freq: 20
    stop_loss: 0.20
    max_position: 0.10

  ic_ir_selected:
    label: "ic_ir_selected"
    description: "IC-IR 加权 + 仅保留有效因子"
    weight_method: "ic_ir"
    top_n: 10
    rebalance_freq: 20
    stop_loss: 0.20
    max_position: 0.10
    ic_filter:
      min_abs_ir: 0.03
      min_positive_rate: 0.50

  markowitz:
    label: "markowitz"
    description: "等权因子 + Markowitz 组合权重优化"
    weight_method: "markowitz"
    top_n: 10
    rebalance_freq: 20
    stop_loss: 0.20
    max_position: 0.15
    risk_aversion: 1.0

# ── 参数扫描网格 ──────────────────────────────────────────
param_scan:
  enabled: false                           # 默认不扫描，需要时设为 true 或 --scan
  top_n: [10, 15, 20, 30]
  rebalance_freq: [5, 10, 20]
  stop_loss: [0.10, 0.15, 0.20]
  max_daily_turnover: [0.20, 0.30]

# ── IC 分析阈值 ──────────────────────────────────────────
ic_analysis:
  forward_period: 5                        # 前向收益计算周期（日）
  min_abs_ir: 0.03                        # 最小 |IC_IR|（因子有效阈值）
  min_positive_rate: 0.50                  # IC > 0 的最低比例

# ── 风控参数 ──────────────────────────────────────────────
risk:
  stop_loss: 0.20
  top_n: 10
  rebalance_freq: 20
  max_single_weight: 0.15
  max_daily_turnover: 0.30
  min_rebalance_interval: 3
